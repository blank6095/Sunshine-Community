<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医生列表</title>
    <link href="../../../static/css/bootstrap.min.css" th:href="@{/css/bootstrap.min.css}" rel="stylesheet"/>
    <link href="../../../static/css/font-awesome.min.css" th:href="@{/css/font-awesome.min.css}" rel="stylesheet"/>
    <link href="../../../static/css/style.min.css" th:href="@{/css/style.min.css}" rel="stylesheet"/>
    <link href="../../../static/ajax/libs/bootstrap-table/bootstrap-table.min.css" th:href="@{/ajax/libs/bootstrap-table/bootstrap-table.min.css}" rel="stylesheet"/>
</head>
<body class="gray-bg">
    <div class="navbar navbar-default navbar-fixed-top" role="navigation">
        <div class="container">
            <div class="navbar-header">
                <a class="navbar-brand" href="/hospital/index">医院挂号系统</a>
            </div>
            <div class="navbar-collapse collapse">
                <ul class="nav navbar-nav navbar-right">
                    <li><a href="/hospital/index">首页</a></li>
                    <li><a href="/hospital/doctor/list" class="active">医生查询</a></li>
                    <li><a href="/hospital/appointment/list">预约管理</a></li>
                    <li><a href="/patient/login" id="loginLink">登录</a></li>
                    <li><a href="/patient/register">注册</a></li>
                </ul>
            </div>
        </div>
    </div>

    <div class="container" style="margin-top: 80px;">
        <div class="row">
            <div class="col-lg-12">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <h5>医生列表</h5>
                    </div>
                    <div class="ibox-content">
                        <div class="row">
                            <div class="col-sm-3">
                                <div class="form-group">
                                    <label class="control-label">科室选择</label>
                                    <select class="form-control" id="deptId">
                                        <option value="">全部科室</option>
                                        <!-- 科室列表将通过AJAX加载 -->
                                    </select>
                                </div>
                            </div>
                            <div class="col-sm-3">
                                <div class="form-group">
                                    <label class="control-label">医生姓名</label>
                                    <input type="text" class="form-control" id="doctorName" placeholder="请输入医生姓名">
                                </div>
                            </div>
                            <div class="col-sm-3">
                                <div class="form-group">
                                    <label class="control-label">职称</label>
                                    <input type="text" class="form-control" id="title" placeholder="请输入职称">
                                </div>
                            </div>
                            <div class="col-sm-3">
                                <div class="form-group">
                                    <label class="control-label">查询</label>
                                    <button type="button" class="btn btn-primary btn-block" id="searchBtn">查询</button>
                                </div>
                            </div>
                        </div>
                        <table id="doctorTable" class="table table-striped table-bordered table-hover"></table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../../static/js/jquery.min.js" th:src="@{/js/jquery.min.js}"></script>
    <script src="../../../static/js/bootstrap.min.js" th:src="@{/js/bootstrap.min.js}"></script>
    <script src="../../../static/ajax/libs/bootstrap-table/bootstrap-table.min.js" th:src="@{/ajax/libs/bootstrap-table/bootstrap-table.min.js}"></script>
    <script src="../../../static/ajax/libs/bootstrap-table/locale/bootstrap-table-zh-CN.js" th:src="@{/ajax/libs/bootstrap-table/locale/bootstrap-table-zh-CN.js}"></script>
    <script src="../../../static/ajax/libs/layer/layer.min.js" th:src="@{/ajax/libs/layer/layer.min.js}"></script>
    <script>
        $(function() {
            // 检查是否已登录
            var patient = localStorage.getItem('patient');
            if (patient) {
                $('#loginLink').text('个人中心');
                $('#loginLink').attr('href', '/hospital/patient/profile');
            }

            // 加载科室列表
            function loadDeptList() {
                $.ajax({
                    type: "GET",
                    url: "/hospital/department/list",
                    success: function(r) {
                        if (r.code == 200) {
                            var deptList = r.data;
                            var html = '<option value="">全部科室</option>';
                            for (var i = 0; i < deptList.length; i++) {
                                html += '<option value="' + deptList[i].deptId + '">' + deptList[i].deptName + '</option>';
                            }
                            $('#deptId').html(html);
                            // 设置默认科室
                            var deptId = [[${deptId}]];
                            if (deptId) {
                                $('#deptId').val(deptId);
                            }
                        }
                    }
                });
            }

            // 初始化医生表格
            function initDoctorTable() {
                $('#doctorTable').bootstrapTable({
                    url: '/hospital/doctor/list',
                    method: 'post',
                    contentType: 'application/x-www-form-urlencoded',
                    dataType: 'json',
                    striped: true,
                    pagination: true,
                    pageSize: 10,
                    pageList: [10, 20, 50],
                    sidePagination: 'server',
                    queryParams: function(params) {
                        return {
                            pageNum: params.offset / params.limit + 1,
                            pageSize: params.limit,
                            doctorName: $('#doctorName').val(),
                            deptId: $('#deptId').val(),
                            title: $('#title').val()
                        };
                    },
                    columns: [
                        {
                            field: 'doctorId',
                            title: '医生ID',
                            visible: false
                        },
                        {
                            field: 'doctorName',
                            title: '医生姓名'
                        },
                        {
                            field: 'deptName',
                            title: '所属科室'
                        },
                        {
                            field: 'title',
                            title: '职称'
                        },
                        {
                            field: 'specialty',
                            title: '专业特长'
                        },
                        {
                            field: 'phone',
                            title: '联系电话'
                        },
                        {
                            field: 'status',
                            title: '状态',
                            formatter: function(value) {
                                return value == '0' ? '正常' : '停用';
                            }
                        },
                        {
                            field: 'operate',
                            title: '操作',
                            formatter: function(value, row) {
                                return '<a href="/hospital/doctor/detail/' + row.doctorId + '" class="btn btn-primary btn-xs">查看详情</a>';
                            }
                        }
                    ]
                });
            }

            // 搜索按钮点击事件
            $('#searchBtn').click(function() {
                $('#doctorTable').bootstrapTable('refresh');
            });

            // 初始化
            loadDeptList();
            initDoctorTable();
        });
    </script>
</body>
</html>
