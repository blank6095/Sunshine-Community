# 开发环境配置

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/smart_registration_db?useSSL=false&serverTimezone=UTC&useLegacyDatetimeCode=false
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT配置
jwt.secret=your-secret-key-here
jwt.expiration.default=86400
jwt.expiration.unit=seconds
jwt.expiration.access-token=3600
jwt.expiration.refresh-token=604800

# 服务器配置
server.port=8080
server.servlet.context-path=/api/v1

# 日志配置
logging.level.root=info
logging.level.com.exclusive.blank=debug
