<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医院挂号系统</title>
    <link href="../../static/css/bootstrap.min.css" th:href="@{/css/bootstrap.min.css}" rel="stylesheet"/>
    <link href="../../static/css/font-awesome.min.css" th:href="@{/css/font-awesome.min.css}" rel="stylesheet"/>
    <link href="../../static/css/style.min.css" th:href="@{/css/style.min.css}" rel="stylesheet"/>
</head>
<body class="gray-bg">
    <div class="navbar navbar-default navbar-fixed-top" role="navigation">
        <div class="container">
            <div class="navbar-header">
                <a class="navbar-brand" href="/hospital/index">医院挂号系统</a>
            </div>
            <div class="navbar-collapse collapse">
                <ul class="nav navbar-nav navbar-right">
                    <li><a href="/hospital/index">首页</a></li>
                    <li><a href="/hospital/doctor/list">医生查询</a></li>
                    <li><a href="/hospital/appointment/list">预约管理</a></li>
                    <li><a href="/patient/login" id="loginLink">登录</a></li>
                    <li><a href="/patient/register">注册</a></li>
                </ul>
            </div>
        </div>
    </div>

    <div class="container" style="margin-top: 80px;">
        <div class="row">
            <div class="col-lg-12">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <h5>医院挂号系统</h5>
                    </div>
                    <div class="ibox-content">
                        <div class="row">
                            <div class="col-md-4">
                                <div class="ibox float-e-margins">
                                    <div class="ibox-title">
                                        <h5>科室导航</h5>
                                    </div>
                                    <div class="ibox-content">
                                        <ul class="list-group" id="deptList">
                                            <!-- 科室列表将通过AJAX加载 -->
                                        </ul>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-8">
                                <div class="ibox float-e-margins">
                                    <div class="ibox-title">
                                        <h5>热门医生</h5>
                                    </div>
                                    <div class="ibox-content">
                                        <div class="row" id="doctorList">
                                            <!-- 医生列表将通过AJAX加载 -->
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../static/js/jquery.min.js" th:src="@{/js/jquery.min.js}"></script>
    <script src="../../static/js/bootstrap.min.js" th:src="@{/js/bootstrap.min.js}"></script>
    <script src="../../static/ajax/libs/layer/layer.min.js" th:src="@{/ajax/libs/layer/layer.min.js}"></script>
    <script>
        $(function() {
            // 检查是否已登录
            var patient = localStorage.getItem('patient');
            if (patient) {
                $('#loginLink').text('个人中心');
                $('#loginLink').attr('href', '/hospital/patient/profile');
            }

            // 加载科室列表
            function loadDeptList() {
                $.ajax({
                    type: "GET",
                    url: "/hospital/department/list",
                    success: function(r) {
                        if (r.code == 200) {
                            var deptList = r.data;
                            var html = '';
                            for (var i = 0; i < deptList.length; i++) {
                                html += '<li class="list-group-item"><a href="/hospital/doctor/list?deptId=' + deptList[i].deptId + '">' + deptList[i].deptName + '</a></li>';
                            }
                            $('#deptList').html(html);
                        }
                    }
                });
            }

            // 加载热门医生
            function loadDoctorList() {
                $.ajax({
                    type: "GET",
                    url: "/hospital/doctor/list",
                    success: function(r) {
                        if (r.code == 200) {
                            var doctorList = r.data;
                            var html = '';
                            for (var i = 0; i < doctorList.length; i++) {
                                html += '<div class="col-md-4">';
                                html += '<div class="ibox float-e-margins">';
                                html += '<div class="ibox-content text-center">';
                                html += '<img alt="头像" class="img-circle" src="' + (doctorList[i].avatar || '../../static/img/user.png') + '" style="width: 80px; height: 80px;">';
                                html += '<h3>' + doctorList[i].doctorName + '</h3>';
                                html += '<p>' + doctorList[i].title + '</p>';
                                html += '<p>' + doctorList[i].specialty + '</p>';
                                html += '<a href="/hospital/doctor/detail/' + doctorList[i].doctorId + '" class="btn btn-primary">查看详情</a>';
                                html += '</div>';
                                html += '</div>';
                                html += '</div>';
                            }
                            $('#doctorList').html(html);
                        }
                    }
                });
            }

            // 初始化加载数据
            loadDeptList();
            loadDoctorList();
        });
    </script>
</body>
</html>
