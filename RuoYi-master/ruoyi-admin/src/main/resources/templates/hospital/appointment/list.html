<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预约管理</title>
    <link href="../../../static/css/bootstrap.min.css" th:href="@{/css/bootstrap.min.css}" rel="stylesheet"/>
    <link href="../../../static/css/font-awesome.min.css" th:href="@{/css/font-awesome.min.css}" rel="stylesheet"/>
    <link href="../../../static/css/style.min.css" th:href="@{/css/style.min.css}" rel="stylesheet"/>
    <link href="../../../static/ajax/libs/bootstrap-table/bootstrap-table.min.css" th:href="@{/ajax/libs/bootstrap-table/bootstrap-table.min.css}" rel="stylesheet"/>
</head>
<body class="gray-bg">
    <div class="navbar navbar-default navbar-fixed-top" role="navigation">
        <div class="container">
            <div class="navbar-header">
                <a class="navbar-brand" href="/hospital/index">医院挂号系统</a>
            </div>
            <div class="navbar-collapse collapse">
                <ul class="nav navbar-nav navbar-right">
                    <li><a href="/hospital/index">首页</a></li>
                    <li><a href="/hospital/doctor/list">医生查询</a></li>
                    <li><a href="/hospital/appointment/list" class="active">预约管理</a></li>
                    <li><a href="/patient/login" id="loginLink">登录</a></li>
                    <li><a href="/patient/register">注册</a></li>
                </ul>
            </div>
        </div>
    </div>

    <div class="container" style="margin-top: 80px;">
        <div class="row">
            <div class="col-lg-12">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <h5>预约管理</h5>
                    </div>
                    <div class="ibox-content">
                        <table id="appointmentTable" class="table table-striped table-bordered table-hover"></table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../../static/js/jquery.min.js" th:src="@{/js/jquery.min.js}"></script>
    <script src="../../../static/js/bootstrap.min.js" th:src="@{/js/bootstrap.min.js}"></script>
    <script src="../../../static/ajax/libs/bootstrap-table/bootstrap-table.min.js" th:src="@{/ajax/libs/bootstrap-table/bootstrap-table.min.js}"></script>
    <script src="../../../static/ajax/libs/bootstrap-table/locale/bootstrap-table-zh-CN.js" th:src="@{/ajax/libs/bootstrap-table/locale/bootstrap-table-zh-CN.js}"></script>
    <script src="../../../static/ajax/libs/layer/layer.min.js" th:src="@{/ajax/libs/layer/layer.min.js}"></script>
    <script>
        $(function() {
            // 检查是否已登录
            var patient = localStorage.getItem('patient');
            if (patient) {
                patient = JSON.parse(patient);
                $('#loginLink').text('个人中心');
                $('#loginLink').attr('href', '/hospital/patient/profile');
            } else {
                layer.msg('请先登录', {icon: 5});
                setTimeout(function() {
                    window.location.href = '/patient/login';
                }, 1000);
                return;
            }

            // 初始化预约表格
            function initAppointmentTable() {
                $('#appointmentTable').bootstrapTable({
                    url: '/hospital/appointment/list',
                    method: 'post',
                    contentType: 'application/x-www-form-urlencoded',
                    dataType: 'json',
                    striped: true,
                    pagination: true,
                    pageSize: 10,
                    pageList: [10, 20, 50],
                    sidePagination: 'server',
                    queryParams: function(params) {
                        return {
                            pageNum: params.offset / params.limit + 1,
                            pageSize: params.limit,
                            patientId: patient.patientId
                        };
                    },
                    columns: [
                        {
                            field: 'appointmentId',
                            title: '预约ID',
                            visible: false
                        },
                        {
                            field: 'doctorName',
                            title: '医生姓名'
                        },
                        {
                            field: 'deptName',
                            title: '所属科室'
                        },
                        {
                            field: 'appointmentDate',
                            title: '预约日期',
                            formatter: function(value) {
                                var date = new Date(value);
                                return date.getFullYear() + '-' + (date.getMonth() + 1) + '-' + date.getDate();
                            }
                        },
                        {
                            field: 'appointmentTime',
                            title: '预约时段',
                            formatter: function(value) {
                                return value == '0' ? '上午' : '下午';
                            }
                        },
                        {
                            field: 'registrationNo',
                            title: '挂号编号'
                        },
                        {
                            field: 'status',
                            title: '状态',
                            formatter: function(value) {
                                if (value == '0') {
                                    return '待就诊';
                                } else if (value == '1') {
                                    return '已就诊';
                                } else {
                                    return '已取消';
                                }
                            }
                        },
                        {
                            field: 'createTime',
                            title: '预约时间',
                            formatter: function(value) {
                                var date = new Date(value);
                                return date.getFullYear() + '-' + (date.getMonth() + 1) + '-' + date.getDate() + ' ' + date.getHours() + ':' + date.getMinutes();
                            }
                        },
                        {
                            field: 'operate',
                            title: '操作',
                            formatter: function(value, row) {
                                var html = '<a href="/hospital/appointment/detail/' + row.appointmentId + '" class="btn btn-primary btn-xs">查看详情</a>';
                                if (row.status == '0') {
                                    html += ' <button type="button" class="btn btn-danger btn-xs cancel-btn" data-id="' + row.appointmentId + '">取消预约</button>';
                                }
                                return html;
                            }
                        }
                    ]
                });
            }

            // 取消预约按钮点击事件
            $(document).on('click', '.cancel-btn', function() {
                var appointmentId = $(this).data('id');
                layer.confirm('确定要取消该预约吗？', {
                    btn: ['确定', '取消']
                }, function() {
                    $.ajax({
                        type: "POST",
                        url: "/hospital/appointment/cancel/" + appointmentId,
                        success: function(r) {
                            if (r.code == 200) {
                                layer.msg(r.msg, {icon: 1});
                                $('#appointmentTable').bootstrapTable('refresh');
                            } else {
                                layer.msg(r.msg, {icon: 5});
                            }
                        }
                    });
                });
            });

            // 初始化
            initAppointmentTable();
        });
    </script>
</body>
</html>
