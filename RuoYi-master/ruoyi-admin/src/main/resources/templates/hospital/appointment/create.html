<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预约挂号</title>
    <link href="../../../static/css/bootstrap.min.css" th:href="@{/css/bootstrap.min.css}" rel="stylesheet"/>
    <link href="../../../static/css/font-awesome.min.css" th:href="@{/css/font-awesome.min.css}" rel="stylesheet"/>
    <link href="../../../static/css/style.min.css" th:href="@{/css/style.min.css}" rel="stylesheet"/>
</head>
<body class="gray-bg">
    <div class="navbar navbar-default navbar-fixed-top" role="navigation">
        <div class="container">
            <div class="navbar-header">
                <a class="navbar-brand" href="/hospital/index">医院挂号系统</a>
            </div>
            <div class="navbar-collapse collapse">
                <ul class="nav navbar-nav navbar-right">
                    <li><a href="/hospital/index">首页</a></li>
                    <li><a href="/hospital/doctor/list">医生查询</a></li>
                    <li><a href="/hospital/appointment/list">预约管理</a></li>
                    <li><a href="/patient/login" id="loginLink">登录</a></li>
                    <li><a href="/patient/register">注册</a></li>
                </ul>
            </div>
        </div>
    </div>

    <div class="container" style="margin-top: 80px;">
        <div class="row">
            <div class="col-lg-12">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <h5>预约挂号</h5>
                    </div>
                    <div class="ibox-content">
                        <form id="appointmentForm">
                            <input type="hidden" name="doctorId" th:value="${doctorId}">
                            <input type="hidden" name="patientId" id="patientId">
                            <div class="form-group">
                                <label class="control-label">选择日期</label>
                                <select class="form-control" name="scheduleId" id="scheduleId" required>
                                    <option value="">请选择日期</option>
                                    <!-- 日期列表将通过AJAX加载 -->
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="control-label">选择时间段</label>
                                <div class="radio">
                                    <label>
                                        <input type="radio" name="appointmentTime" value="0" required> 上午
                                    </label>
                                </div>
                                <div class="radio">
                                    <label>
                                        <input type="radio" name="appointmentTime" value="1" required> 下午
                                    </label>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary">提交预约</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../../static/js/jquery.min.js" th:src="@{/js/jquery.min.js}"></script>
    <script src="../../../static/js/bootstrap.min.js" th:src="@{/js/bootstrap.min.js}"></script>
    <script src="../../../static/ajax/libs/validate/jquery.validate.min.js" th:src="@{/ajax/libs/validate/jquery.validate.min.js}"></script>
    <script src="../../../static/ajax/libs/validate/messages_zh.js" th:src="@{/ajax/libs/validate/messages_zh.js}"></script>
    <script src="../../../static/ajax/libs/layer/layer.min.js" th:src="@{/ajax/libs/layer/layer.min.js}"></script>
    <script>
        $(function() {
            // 检查是否已登录
            var patient = localStorage.getItem('patient');
            if (patient) {
                patient = JSON.parse(patient);
                $('#loginLink').text('个人中心');
                $('#loginLink').attr('href', '/hospital/patient/profile');
                $('#patientId').val(patient.patientId);
            } else {
                layer.msg('请先登录', {icon: 5});
                setTimeout(function() {
                    window.location.href = '/patient/login';
                }, 1000);
                return;
            }

            // 加载号源列表
            function loadScheduleList() {
                var doctorId = [[${doctorId}]];
                $.ajax({
                    type: "GET",
                    url: "/hospital/appointment/schedule/listByDoctor/" + doctorId,
                    success: function(r) {
                        if (r.code == 200) {
                            var scheduleList = r.data;
                            var html = '<option value="">请选择日期</option>';
                            for (var i = 0; i < scheduleList.length; i++) {
                                var date = new Date(scheduleList[i].scheduleDate);
                                var dateStr = date.getFullYear() + '-' + (date.getMonth() + 1) + '-' + date.getDate();
                                var optionText = dateStr + ' (上午剩余: ' + scheduleList[i].morningAvailable + ', 下午剩余: ' + scheduleList[i].afternoonAvailable + ')';
                                html += '<option value="' + scheduleList[i].scheduleId + '" data-morning-available="' + scheduleList[i].morningAvailable + '" data-afternoon-available="' + scheduleList[i].afternoonAvailable + '">' + optionText + '</option>';
                            }
                            $('#scheduleId').html(html);
                        }
                    }
                });
            }

            // 监听日期选择变化
            $('#scheduleId').change(function() {
                var selectedOption = $(this).find('option:selected');
                var morningAvailable = selectedOption.data('morning-available');
                var afternoonAvailable = selectedOption.data('afternoon-available');

                // 禁用不可用的时间段
                $('input[name="appointmentTime"][value="0"]').prop('disabled', morningAvailable <= 0);
                $('input[name="appointmentTime"][value="1"]').prop('disabled', afternoonAvailable <= 0);

                // 清空已选的时间段
                $('input[name="appointmentTime"]').prop('checked', false);
            });

            // 提交预约表单
            $('#appointmentForm').validate({
                rules: {
                    scheduleId: {required: true},
                    appointmentTime: {required: true}
                },
                submitHandler: function(form) {
                    var data = $(form).serializeObject();
                    $.ajax({
                        type: "POST",
                        url: "/hospital/appointment/create",
                        contentType: "application/json",
                        data: JSON.stringify(data),
                        success: function(r) {
                            if (r.code == 200) {
                                layer.msg(r.msg, {icon: 1});
                                setTimeout(function() {
                                    window.location.href = '/hospital/appointment/list';
                                }, 1500);
                            } else {
                                layer.msg(r.msg, {icon: 5});
                            }
                        }
                    });
                }
            });

            // 初始化
            loadScheduleList();
        });
    </script>
</body>
</html>
