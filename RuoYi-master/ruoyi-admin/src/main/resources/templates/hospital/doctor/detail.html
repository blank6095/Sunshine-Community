<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医生详情</title>
    <link href="../../../static/css/bootstrap.min.css" th:href="@{/css/bootstrap.min.css}" rel="stylesheet"/>
    <link href="../../../static/css/font-awesome.min.css" th:href="@{/css/font-awesome.min.css}" rel="stylesheet"/>
    <link href="../../../static/css/style.min.css" th:href="@{/css/style.min.css}" rel="stylesheet"/>
</head>
<body class="gray-bg">
    <div class="navbar navbar-default navbar-fixed-top" role="navigation">
        <div class="container">
            <div class="navbar-header">
                <a class="navbar-brand" href="/hospital/index">医院挂号系统</a>
            </div>
            <div class="navbar-collapse collapse">
                <ul class="nav navbar-nav navbar-right">
                    <li><a href="/hospital/index">首页</a></li>
                    <li><a href="/hospital/doctor/list">医生查询</a></li>
                    <li><a href="/hospital/appointment/list">预约管理</a></li>
                    <li><a href="/patient/login" id="loginLink">登录</a></li>
                    <li><a href="/patient/register">注册</a></li>
                </ul>
            </div>
        </div>
    </div>

    <div class="container" style="margin-top: 80px;">
        <div class="row">
            <div class="col-lg-12">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <h5>医生详情</h5>
                    </div>
                    <div class="ibox-content">
                        <div class="row">
                            <div class="col-md-3">
                                <img alt="医生头像" th:src="${doctor.avatar != null ? doctor.avatar : '@{/img/user.png}'}" class="img-circle" style="width: 150px; height: 150px;">
                            </div>
                            <div class="col-md-9">
                                <h2 th:text="${doctor.doctorName}"></h2>
                                <p><strong>所属科室：</strong><span th:text="${doctor.deptName}"></span></p>
                                <p><strong>职称：</strong><span th:text="${doctor.title}"></span></p>
                                <p><strong>专业特长：</strong><span th:text="${doctor.specialty}"></span></p>
                                <p><strong>联系电话：</strong><span th:text="${doctor.phone}"></span></p>
                                <button type="button" class="btn btn-primary" id="appointmentBtn" th:attr="data-doctor-id=${doctor.doctorId}">预约挂号</button>
                            </div>
                        </div>
                        <hr>
                        <div class="row">
                            <div class="col-md-12">
                                <h4>医生简介</h4>
                                <p>医生简介内容将在此显示，包括医生的教育背景、工作经历、专业成就等信息。</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../../static/js/jquery.min.js" th:src="@{/js/jquery.min.js}"></script>
    <script src="../../../static/js/bootstrap.min.js" th:src="@{/js/bootstrap.min.js}"></script>
    <script src="../../../static/ajax/libs/layer/layer.min.js" th:src="@{/ajax/libs/layer/layer.min.js}"></script>
    <script>
        $(function() {
            // 检查是否已登录
            var patient = localStorage.getItem('patient');
            if (patient) {
                $('#loginLink').text('个人中心');
                $('#loginLink').attr('href', '/hospital/patient/profile');
            }

            // 预约挂号按钮点击事件
            $('#appointmentBtn').click(function() {
                var doctorId = $(this).data('doctor-id');
                // 检查是否已登录
                var patient = localStorage.getItem('patient');
                if (!patient) {
                    layer.msg('请先登录', {icon: 5});
                    setTimeout(function() {
                        window.location.href = '/patient/login';
                    }, 1000);
                    return;
                }
                // 跳转到预约挂号页面
                window.location.href = '/hospital/appointment/create?doctorId=' + doctorId;
            });
        });
    </script>
</body>
</html>
