<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预约详情</title>
    <link href="../../../static/css/bootstrap.min.css" th:href="@{/css/bootstrap.min.css}" rel="stylesheet"/>
    <link href="../../../static/css/font-awesome.min.css" th:href="@{/css/font-awesome.min.css}" rel="stylesheet"/>
    <link href="../../../static/css/style.min.css" th:href="@{/css/style.min.css}" rel="stylesheet"/>
</head>
<body class="gray-bg">
    <div class="navbar navbar-default navbar-fixed-top" role="navigation">
        <div class="container">
            <div class="navbar-header">
                <a class="navbar-brand" href="/hospital/index">医院挂号系统</a>
            </div>
            <div class="navbar-collapse collapse">
                <ul class="nav navbar-nav navbar-right">
                    <li><a href="/hospital/index">首页</a></li>
                    <li><a href="/hospital/doctor/list">医生查询</a></li>
                    <li><a href="/hospital/appointment/list">预约管理</a></li>
                    <li><a href="/patient/login" id="loginLink">登录</a></li>
                    <li><a href="/patient/register">注册</a></li>
                </ul>
            </div>
        </div>
    </div>

    <div class="container" style="margin-top: 80px;">
        <div class="row">
            <div class="col-lg-12">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <h5>预约详情</h5>
                    </div>
                    <div class="ibox-content">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="control-label">患者姓名：</label>
                                    <span th:text="${appointment.patientName}"></span>
                                </div>
                                <div class="form-group">
                                    <label class="control-label">医生姓名：</label>
                                    <span th:text="${appointment.doctorName}"></span>
                                </div>
                                <div class="form-group">
                                    <label class="control-label">所属科室：</label>
                                    <span th:text="${appointment.deptName}"></span>
                                </div>
                                <div class="form-group">
                                    <label class="control-label">预约日期：</label>
                                    <span th:text="${#dates.format(appointment.appointmentDate, 'yyyy-MM-dd')}"></span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="control-label">预约时段：</label>
                                    <span th:text="${appointment.appointmentTime == '0' ? '上午' : '下午'}"></span>
                                </div>
                                <div class="form-group">
                                    <label class="control-label">挂号编号：</label>
                                    <span th:text="${appointment.registrationNo}"></span>
                                </div>
                                <div class="form-group">
                                    <label class="control-label">预约状态：</label>
                                    <span th:text="${appointment.status == '0' ? '待就诊' : (appointment.status == '1' ? '已就诊' : '已取消')}"></span>
                                </div>
                                <div class="form-group">
                                    <label class="control-label">预约时间：</label>
                                    <span th:text="${#dates.format(appointment.createTime, 'yyyy-MM-dd HH:mm')}"></span>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-12">
                                <div class="form-group">
                                    <label class="control-label">就诊须知：</label>
                                    <p>1. 请携带身份证原件和医保卡（如有）前往医院就诊。</p>
                                    <p>2. 请提前30分钟到达医院，凭挂号编号在自助机上取号。</p>
                                    <p>3. 如需取消预约，请至少提前24小时操作，以免影响您的信用记录。</p>
                                    <p>4. 如有疑问，请拨打医院服务电话：010-12345678。</p>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-12 text-center">
                                <a href="/hospital/appointment/list" class="btn btn-primary">返回列表</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../../static/js/jquery.min.js" th:src="@{/js/jquery.min.js}"></script>
    <script src="../../../static/js/bootstrap.min.js" th:src="@{/js/bootstrap.min.js}"></script>
    <script>
        $(function() {
            // 检查是否已登录
            var patient = localStorage.getItem('patient');
            if (patient) {
                $('#loginLink').text('个人中心');
                $('#loginLink').attr('href', '/hospital/patient/profile');
            }
        });
    </script>
</body>
</html>
