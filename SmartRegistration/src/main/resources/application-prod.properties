# 生产环境配置

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/smart_registration_prod?useSSL=true&serverTimezone=UTC&useLegacyDatetimeCode=false
spring.datasource.username=smart_registration
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA配置
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# JWT配置
jwt.secret=${JWT_SECRET}
jwt.expiration.default=86400
jwt.expiration.unit=seconds
jwt.expiration.access-token=3600
jwt.expiration.refresh-token=604800

# 服务器配置
server.port=8080
server.servlet.context-path=/api/v1

# 日志配置
logging.level.root=error
logging.level.com.exclusive.blank=warn

# 安全配置
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=${SSL_PASSWORD}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=smart_registration
