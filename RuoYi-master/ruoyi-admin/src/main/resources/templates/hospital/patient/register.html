<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>患者注册</title>
    <link href="../../../static/css/bootstrap.min.css" th:href="@{/css/bootstrap.min.css}" rel="stylesheet"/>
    <link href="../../../static/css/font-awesome.min.css" th:href="@{/css/font-awesome.min.css}" rel="stylesheet"/>
    <link href="../../../static/css/login.css" th:href="@{/css/login.css}" rel="stylesheet"/>
</head>
<body class="gray-bg">
    <div class="middle-box text-center loginscreen  animated fadeInDown">
        <div>
            <div>
                <h1 class="logo-name">医院挂号系统</h1>
            </div>
            <h3>患者注册</h3>
            <p>请填写以下信息完成注册</p>
            <form class="m-t" role="form" id="registerForm">
                <div class="form-group">
                    <input type="text" class="form-control" placeholder="患者姓名" name="patientName" required>
                </div>
                <div class="form-group">
                    <input type="text" class="form-control" placeholder="身份证号" name="idCard" required>
                </div>
                <div class="form-group">
                    <input type="text" class="form-control" placeholder="联系电话" name="phone" required>
                </div>
                <div class="form-group">
                    <select class="form-control" name="gender" required>
                        <option value="">请选择性别</option>
                        <option value="0">男</option>
                        <option value="1">女</option>
                    </select>
                </div>
                <div class="form-group">
                    <input type="date" class="form-control" placeholder="出生日期" name="birthDate" required>
                </div>
                <div class="form-group">
                    <input type="text" class="form-control" placeholder="地址" name="address">
                </div>
                <button type="submit" class="btn btn-primary block full-width m-b">注册</button>
                <p class="text-muted text-center">
                    <a href="/patient/login"><small>已有账号？去登录</small></a>
                </p>
            </form>
        </div>
    </div>
    <script src="../../../static/js/jquery.min.js" th:src="@{/js/jquery.min.js}"></script>
    <script src="../../../static/js/bootstrap.min.js" th:src="@{/js/bootstrap.min.js}"></script>
    <script src="../../../static/ajax/libs/validate/jquery.validate.min.js" th:src="@{/ajax/libs/validate/jquery.validate.min.js}"></script>
    <script src="../../../static/ajax/libs/validate/messages_zh.js" th:src="@{/ajax/libs/validate/messages_zh.js}"></script>
    <script>
        $(function() {
            $('#registerForm').validate({
                rules: {
                    patientName: {required: true},
                    idCard: {required: true, maxlength: 18},
                    phone: {required: true, maxlength: 11},
                    gender: {required: true},
                    birthDate: {required: true}
                },
                submitHandler: function(form) {
                    var data = $(form).serializeObject();
                    $.ajax({
                        type: "POST",
                        url: "/patient/register",
                        contentType: "application/json",
                        data: JSON.stringify(data),
                        success: function(r) {
                            if (r.code == 200) {
                                layer.msg(r.msg, {icon: 1});
                                setTimeout(function() {
                                    window.location.href = "/patient/login";
                                }, 1500);
                            } else {
                                layer.msg(r.msg, {icon: 5});
                            }
                        }
                    });
                }
            });
        });
    </script>
</body>
</html>
