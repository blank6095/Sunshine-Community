# 测试环境配置

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/smart_registration_test?useSSL=false&serverTimezone=UTC&useLegacyDatetimeCode=false
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT配置
jwt.secret=test-secret-key-change-in-production
jwt.expiration.default=3600
jwt.expiration.unit=seconds
jwt.expiration.access-token=3600
jwt.expiration.refresh-token=86400

# 服务器配置
server.port=8081
server.servlet.context-path=/api/v1

# 日志配置
logging.level.root=warn
logging.level.com.exclusive.blank=info
