<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>患者登录</title>
    <link href="../../../static/css/bootstrap.min.css" th:href="@{/css/bootstrap.min.css}" rel="stylesheet"/>
    <link href="../../../static/css/font-awesome.min.css" th:href="@{/css/font-awesome.min.css}" rel="stylesheet"/>
    <link href="../../../static/css/login.css" th:href="@{/css/login.css}" rel="stylesheet"/>
</head>
<body class="gray-bg">
    <div class="middle-box text-center loginscreen  animated fadeInDown">
        <div>
            <div>
                <h1 class="logo-name">医院挂号系统</h1>
            </div>
            <h3>患者登录</h3>
            <p>请使用身份证号和手机号登录</p>
            <form class="m-t" role="form" id="loginForm">
                <div class="form-group">
                    <input type="text" class="form-control" placeholder="身份证号" name="idCard" required>
                </div>
                <div class="form-group">
                    <input type="text" class="form-control" placeholder="联系电话" name="phone" required>
                </div>
                <button type="submit" class="btn btn-primary block full-width m-b">登录</button>
                <p class="text-muted text-center">
                    <a href="/patient/register"><small>没有账号？去注册</small></a>
                </p>
            </form>
        </div>
    </div>
    <script src="../../../static/js/jquery.min.js" th:src="@{/js/jquery.min.js}"></script>
    <script src="../../../static/js/bootstrap.min.js" th:src="@{/js/bootstrap.min.js}"></script>
    <script src="../../../static/ajax/libs/validate/jquery.validate.min.js" th:src="@{/ajax/libs/validate/jquery.validate.min.js}"></script>
    <script src="../../../static/ajax/libs/validate/messages_zh.js" th:src="@{/ajax/libs/validate/messages_zh.js}"></script>
    <script src="../../../static/ajax/libs/layer/layer.min.js" th:src="@{/ajax/libs/layer/layer.min.js}"></script>
    <script>
        $(function() {
            $('#loginForm').validate({
                rules: {
                    idCard: {required: true, maxlength: 18},
                    phone: {required: true, maxlength: 11}
                },
                submitHandler: function(form) {
                    var idCard = $('input[name="idCard"]').val();
                    var phone = $('input[name="phone"]').val();
                    $.ajax({
                        type: "POST",
                        url: "/patient/login",
                        data: {idCard: idCard, phone: phone},
                        success: function(r) {
                            if (r.code == 200) {
                                layer.msg('登录成功', {icon: 1});
                                // 保存患者信息到本地存储
                                localStorage.setItem('patient', JSON.stringify(r.patient));
                                setTimeout(function() {
                                    window.location.href = "/hospital/index";
                                }, 1500);
                            } else {
                                layer.msg(r.msg, {icon: 5});
                            }
                        }
                    });
                }
            });
        });
    </script>
</body>
</html>
